<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>로그인 폼</title>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <h1>로그인 폼</h1>
        <form action="#" method="get">
            <ul>
                <li><i class="fa-solid fa-crown"></i></li>
                <li>
                    <img src="../Image/stickman.png" alt="프로필 이미지" width="200" height="200">
                </li>
                <li>
                    <label for="name"><i class="fa-solid fa-envelope-open"></i></label>
                    <input type="text" name="name" placeholder="Username">
                </li>
                <li>
                    <label for="password"><i class="fa-solid fa-lock"></i></label>
                    <input type="password" name="password" placeholder="Password">
                </li>
                <li>
                    <input type="radio" name="save" value="remember"><span>Remember Me</span>
                    <input type="radio" name="save" value="forget"><span>Forgot your password?</span>
                </li>
                <li>
                    <button>Login</button>
                </li>
            </ul>
        </form>
    </body>
</html>
