<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SEO</title>
        <meta name="Description" content="SEO 개념을 숙지합니다.">
    </head>
    <body>
        <!--
            SEO (Search Engine Optimization) - "검색 엔진 최적화"
            개념 : 검색 엔진에서 상위에 노출되도록 웹사이트를 최적화하는 기술
            검색 엔진 - Google / Naver / Microsoft Edge...

            SEO 핵심 기술
            - HTML5 Sementic Tag 구현
            - Title
            - Meta Description
            - Heading
            - Content : img-alt, label-for ...

            SEO를 적용하는 사이트
            - 블로그 / 쇼핑몰 / 교육 사이트 ...
        -->
        
        <!-- <h1>HTML4 Layout</h1>
        <div id="header">Header</div>
        <div id="content">Content</div>
        <div id="footer">Footer</div> -->

        <h1>HTML5 Layout</h1>
        <header>Header</header>
        <main>Content</main>
        <footer>Footer</footer>

    </body>
</html>
