<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Table</title>
    </head>
    <body>
        <h1>Table</h1>
        <table border="1">
            <tr>
                <th>번호</th>
                <th>상품명</th>
                <th>가격</th>
            </tr>
            <tbody>
                <tr>
                    <td rowspan="2">1</td>
                    <td>Monitor</td>
                    <td>1000</td>
                </tr>
                <tr>
                    <!-- <td>2</td> -->
                    <td>Keyboard</td>
                    <td>2000</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Mouse</td>
                    <td>3000</td>
                </tr>
                <tr>
                    <td colspan="3">4</td>
                    <!-- <td colspan="2">프린터</td> -->
                </tr>
                <tfoot>
                    <tr>
                        <th colspan="2">합계</th>
                        <!--<th></th>-->
                        <th>6000</th>
                    </tr>
                </tfoot>
            </tbody>
        </table>
    </body>
</html>
