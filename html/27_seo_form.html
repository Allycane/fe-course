<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign-in Form</title>
        <style>
            ul {
                list-style-type: none;
            }
        </style>
        <meta name="Description" content="회원가입 폼 작성한 예제입니다.">
    </head>
    <body>
        <main>
        <h1>회원가입 폼</h1>
        <form action="#" method="get">
        <!-- GET : 서버에 데이터 전송 방식으로 URL을 사용함 -->
            <ul>
                <!-- <fieldset>
                    <legend>개인정보</legend> -->
                <li>
                    <label for="id">아이디</label>
                    <input type="text" name="id" id="id">
                </li>
                <li>
                    <label for="password">비밀번호</label>
                    <input type="password" name="password" id="password">
                </li>
                <li>
                    <label for="name">이름</label>
                    <input type="text" name="name" id="name">
                </li>
                <!-- <fieldset>
                    <legend>주소 선택 태그</legend> -->
                <li>
                    <label for="address1">주소1</label>
                    <input type="text" name="address1" id="address1">
                </li>
                <li>
                    <label for="address2">주소2</label>
                    <input type="radio" name="address2" id="address2" value="서울"><span>서울시</span>
                    <input type="radio" name="address2" id="address2" value="인천"><span>인천시</span>
                    <input type="radio" name="address2" id="address2" value="부산"><span>부산시</span>
                </li>
                <li>
                    <label for="address3">주소3</label>
                    <input type="checkbox" name="address3" id="address3" value="서울"><span>서울시</span>
                    <input type="checkbox" name="address3" id="address3" value="인천"><span>인천시</span>
                    <input type="checkbox" name="address3" id="address3" value="부산"><span>부산시</span>
                </li>
                <li>
                    <label for="address4">주소4</label>
                    <select name="address4" id="address4">
                        <option value="선택">선택하세요</option>
                        <option value="서울">서울시</option>
                        <option value="인천">인천시</option>
                        <option value="부산">부산시</option>
                    </select>
                </li>
                <!-- </fieldset> -->
                <li>
                    <label for="birthday">생년월일</label>
                    <input type="date" name="birthday" id="birthday">
                </li>
                <li>
                    <label for="photo">프로필사진업로드</label>
                    <input type="file" name="photo" id="photo">
                </li>
                <li>
                    <label for="intro">자기소개</label>
                    <textarea name="intro" id="intro" cols="50" rows="10" placeholder="100자 이내로 작성해주세요..."></textarea>
                </li>
                <li>
                    <button type="submit">전송</button>
                    <button type="button">전송(이벤트X)</button>
                    <button type="reset">다시쓰기</button>
                </li>
                <!-- </fieldset> -->
            </ul>
        </form>
        </main>
    </body>
</html>
