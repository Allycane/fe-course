<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CGV-Demo</title>
        <link rel="stylesheet" href="../css/cgv.css">
        <link rel="stylesheet" href="../css/commons.css">
        <script src="../js/cgv_support.js"></script>
    </head>
    <body>
        <iframe src="../html/header.html" frameborder="0" width="100%" height="150px"></iframe>

        <div class="content">
            <div class="support center-layout">
                <h1 class="center-title">공지/뉴스</h1>
                <div class="support-content">
                    <p>CGV의 주요한 이슈 및 여러가지 소식을 확인하실 수 있습니다.</p>
                    <div>
                        <select name="search_category" id="search_category">
                            <option value="title">제목</option>
                            <option value="content">내용</option>
                        </select>
                        <input type="text" name="search_content" id="search_content" placeholder="검색할 내용을 입력하세요">
                        <button type="button" id="btnSearch">검색하기</button>
                    </div>
                    <nav>
                        <ul class="filter-menu">
                            <li><a href="#" id="all">전체</a></li>
                            <li><a href="#" id="system">시스템점검</a></li>
                            <li><a href="#" id="theatre">극장</a></li>
                            <li><a href="#" id="event">행사/이벤트</a></li>
                            <li><a href="#" id="partner">제휴이벤트</a></li>
                            <li><a href="#" id="etc">기타</a></li>
                        </ul>
                    </nav>
                    <p id="before-table">총 114건이 검색되었습니다</p>
                </div>
                
            </div>
        </div>



        <iframe src="../html/footer.html" frameborder="0" width="100%" height="500px"></iframe>
    </body>
</html>
