<head>

    <title>Margin Auto</title>
    <style>
        h1 {
            width: 1000px; height: 200px;
            background-color: chocolate;
            margin: auto;

        div {
            width: 100%; height: 500px;
            background-color: blue;
        }
        p {
            width: 800px;
            background-color: white;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Margin Auto</h1>
    <div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Velit at iure, reiciendis nulla, minus repellendus laudantium vel molestiae, nobis dignissimos illo non repudiandae quidem! Amet similique quae numquam consectetur labore?</p>
    </div>

</html>
