<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Display Grid Layout</title>
        <meta name="description" content="Display Grid Layout">
        <style>
            div { 
                border: 1px solid blue;
            }
            .grid-wrap {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr 2fr;
                /* grid-template-columns: repeat(4, 1fr); */
                border: 1px solid blue;

                grid-template-rows: 100px auto;

                gap: 10px;
                /* align-items: center; 셀 기준으로 세로 정렬 */
                justify-content: center; /* 셀 기준으로 가로 정렬 */
            }
            .list-grid-wrap {
                border: 1px solid black;
                list-style-type: none;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
            }
            .item-grid {
                border: 1px solid blue;
                grid-column: span 3; /* 컬럼 병합 */
                /* 위에 grid-template-columns에 선언한 갯수를 오버할 시, 오버한 만큼 컬럼을 땡겨서 쓰게 된다.*/
            }
            img[alt="img1"], img[alt="img2"] {
                width: 100px; height: 100px;
            }
            img[alt="img3"] {
                width: 200px;
            }
        </style>
    </head>
    <body>
        <h1>Display Grid Layout</h1>
        <div class="grid-wrap">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
        </div>
        <ul class="list-grid-wrap"> <!-- 2행 2열, 이미지 사이즈 작게-->
            <li class="item-grid"><img src="../Image/stickman.png" alt="img1"></li>
            <li><img src="../Image/stickman.png" alt="img2"></li>
            <li><img src="../Image/img01.png" alt="img3"></li>
            <li><img src="../Image/stickman.png" alt="img2"></li>
            <li><img src="../Image/img01.png" alt="img3"></li>
            <li><img src="../Image/stickman.png" alt="img2"></li>
            <li><img src="../Image/img01.png" alt="img3"></li>
        </ul>
    </body>
</html>
