<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Layout</title>
    <meta name="description" content="Starbucks Layout Practice">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <style>
            .header {
                display: flex;
                margin: auto;
                justify-content: space-between;
                /* border: 1px solid blue; */
                align-items: end;
                width: 1000px;
            }
            header ul {
                list-style-type: none;
            }
            .menu{
                margin-right: 10px;
            }
            .header-top-menu {
                /* border: 1px solid blue; */
                display: flex;
                gap: 15px;
                padding: 0;
                justify-content: right;
                margin-right: 40px;
            }
            .header-bottom-menu{
                /* border: 1px solid orange; */
                display: flex;
                gap: 20px;
                padding: 0;
            }
            li a {
                text-decoration: none;
            }
            .header-top-menu a {
                font-size: 12px;
                color: black;
            }
            .header-bottom-menu a {
                font-size: 14px;
                color: black;
            }
        </style>
</head>
<body>
    <header>
        <div class="header">
            <div id="logo">
                <a href="#"><img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="starbucks logo"></a>
            </div>
            <div class="menu">
                <nav>
                    <ul class="header-top-menu">
                        <li><a href="#">Sign In</a></li>
                        <li><a href="#">My Starbucks</a></li>
                        <li><a href="#">Customer Service & Ideas</a></li>
                        <li><a href="#">Find a Store</a></li>
                        <li><a href="#"><i class="fa-solid fa-magnifying-glass"></i></a></li>
                    </ul>
                </nav>
                <nav>
                    <ul class="header-bottom-menu">
                        <li><a href="#">COFFEE</a></li>
                        <li><a href="#">MENU</a></li>
                        <li><a href="#">STORE</a></li>
                        <li><a href="#">ESG</a></li>
                        <li><a href="#">STARBUCKS REWARDS</a></li>
                        <li><a href="#">CORPORATE SALES</a></li>
                        <li><a href="#">WHAT'S NEW</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
</body>
</html>
