<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Background-Position</title>
        <meta name="description" content="Background-Position">
        <style>
            .bg-wrap {
                border: 1px solid chocolate;
                width: 100%; height: 300px;
                background-image: url("../Image/pattern_2.jpg");
                background-repeat: no-repeat;
                background-position: 0 50%;
                background-size: auto;
            }

            .bg-star {
                width: 100%; height: 33.3vw; /* height: 640px */
                background-image: url("https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg");
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
            }
        </style>
    </head>
    <body>
        <h1>Background-Position</h1>
        <div class="bg-wrap"></div>
        <div class="bg-star"></div>
    </body>
</html>
