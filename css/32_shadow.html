<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Style</title>
    <style>
        .text {
            text-shadow: 10px 5px 0 rgba(97, 89, 55, 0.5);
        }
        .box {
            width: 500px; height: 400px;
            background-color: chocolate;
            -webkit-box-shadow: 30px -30px 36px 40px rgba(23, 30, 116, 1);
            -moz-box-shadow: 30px -30px 36px 40px rgba(23, 30, 116, 1);
            box-shadow: 30px -30px 36px 40px rgba(23, 30, 116, 1);
        }
    </style>
</head>
<body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-Shadow</h2>
    <h3 class="box">Box-Shadow</h3>
</body>
</html>
