<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        /* div { width: 300px; height: 200px; background-color: chocolate; margin: 0;} */
        .content-box {
            box-sizing: content-box; /* box-sizing default */
            border: 10px solid red;
            padding: 0 10px;
        }
        .border-box {
            box-sizing: border-box;
            /* border: 10px solid blue; */
            padding: 0 10px;
        }
        .d1 {
            width: 800px; height: 200px;
            margin-top: 30px;
            background-color: aquamarine;
            display: flex;
        }
        .d0 {
            width: 400px; height: 300px;
            border: 1px solid gray;
            padding: 20px;
            box-sizing: border-box;
        }
        .d0 p {
            border: 0;
            border-right: 10px solid red;
            padding: 20px;
            /* margin: 20px; */
            background-color: white;
        }
    </style>
</head>
<body>
    <h1>Box Size</h1>
    <div class="content-box">Box Sizing : Content-Box</div>
    <div class="border-box">Box Sizing : Border-Box</div>
    <div class="d0">
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Exercitationem dolorum corporis, dicta ea dolorem quis voluptas quod earum porro. Soluta eius commodi earum perferendis, minus omnis corrupti ad voluptas libero?</p>
    </div>
    <div class="d1">
        <p class="p1">lorem</p>
        <p class="p2">lorem</p>
    </div>
</body>
</html>
